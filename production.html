<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Viajes Oficial</title>
    <meta name="description" content="El portal definitivo de reserva de hoteles y vuelos.">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: Arial, sans-serif; margin: 0; padding: 40px; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid #334155; width: 300px; margin: 100px auto; text-align: center; }
        .login-card input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 10px; background: #3b82f6; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .header { border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; }
        .qa-btn-book { background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .obstructor-overlay { position: fixed; bottom: 10px; left: 10px; width: 450px; height: 140px; background: #e2e8f0; color: black; padding: 15px; border-radius: 8px; z-index: 9999; }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginSection = document.getElementById("login-section");
            const dashboardSection = document.getElementById("dashboard-section");
            const loginForm = document.getElementById("form-login-prod");

            if (document.cookie.includes("qa_session=active_token")) {
                loginSection.style.display = "none";
                dashboardSection.style.display = "block";
            }

            if (loginForm) {
                loginForm.addEventListener("submit", (event) => {
                    event.preventDefault();
                    document.cookie = "qa_session=active_token; path=/";
                    loginSection.style.display = "none";
                    dashboardSection.style.display = "block";
                });
            }
        });
    </script>
</head>
<body>

    <div class="obstructor-overlay">
        <strong>Pop-up de Cookies:</strong> Este cartel bloquea los elementos interactivos que queden abajo.
    </div>

    <div id="login-section">
        <div class="login-card">
            <h2>Ingreso Producción</h2>
            <form id="form-login-prod">
                <input type="text" name="txtUser" placeholder="Usuario" required>
                <input type="password" name="txtPassword" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="header">
            <h1 class="qa-main-title" style="font-size: 28px;">Portal de Viajes - Producción</h1>
        </div>

        <div class="grid">
            <div class="card">
                <h3 class="qa-card-promo">Vuelo + Hotel a Mendoza</h3>
                <p>Disfrutá de la nieve y los mejores paisajes del sur chileno y argentino.</p>
                <label for="newsletter_sub">Suscribirse:</label>
                <input type="text" id="newsletter_sub" placeholder="Tu Email">
                <button class="qa-btn-book">Reservar Ahora</button>
            </div>
            <div class="card">
                <h3>Publicidad</h3>
                <ins class="adsbygoogle" style="display:block; width:100%; height:100px; background:#1e293b;"></ins>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <h3>Enlaces</h3>
            <a href="https://qa.amv.travel/" id="link_home">Ir a la Home Pública</a> | 
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=150" id="img_banner" alt="Playa paradisíaca">
        </div>

        <div id="layout-shifter" style="height: 0px;"></div>
        <script>
            setTimeout(() => {
                document.getElementById('layout-shifter').style.height = '150px';
                document.getElementById('layout-shifter').innerHTML = '<div style="background:#ef4444; padding:20px;">🔥 CLS DETECTADO</div>';
            }, 600);
        </script>
    </div>

</body>
</html>
